<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Arrecife Digital</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/logopng.webp">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>
    <header class="header-main2">
        <div class="header-left">
        <h1><i class="fas fa-user-circle"></i> Mi Perfil</h1>
        </div>
        <div class="header-right">
        <button onclick="window.location.href='index.html'" class="btn-back">
            <i class="fas fa-arrow-left"></i> Inicio
        </button>
        </div>
    </header>

    <main class="form-section">
    <div id="auth-logged-out" class="profile-card">
        <i class="fab fa-google" id="google"></i>
        <img src="assets/logopng.webp" alt="Arrecife Digital Logo" class="logo2">
        <h2 class="welcome">📖 ¡Bienvenido al Arrecife! 📕</h2>
        <p class="protip">Pro Tip: Inicia sesión para guardar tus libros favoritos y colaborar con la comunidad.</p>
        <button onclick="loginConGoogle()" class="btn-login-google">
            <i class="fab fa-google"></i> Continuar con Google
        </button>
    </div>

    <div id="auth-logged-in" class="profile-card" style="display: none;">
        <div class="user-header">
            <img id="user-avatar" src="" alt="Avatar" class="profile-avatar">
            <h2 id="user-name">Cargando...</h2>
            <p id="user-email">...</p>
        </div>
        
        <hr class="divider">

        <div class="config-group">
            <h3 class="preferences"><i class="fas fa-sliders-h"></i> Preferencias</h3>
            <div class="config-item">
                <label>Modo Oscuro:</label>
                <label class="theme-switch">
                    <input type="checkbox" id="checkbox">
                    <div class="slider round"></div>
                </label>
            </div>
        </div>

        <button onclick="logout()" class="btn-logout">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </button>
    </div>
</main>
    <p class="form-help"><i class="fas fa-info-circle" id="form-help-icon"></i>Pro tip: Usa Shift + rueda para navegar, en el caso de que uses un PC...</p>

    <div id="toast-container"></div>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="perfil.js"></script>
</body>
</html>
