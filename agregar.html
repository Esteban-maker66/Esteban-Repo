<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colaborar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="admin-header">
        <h1><i class="fas fa-pen"></i> Colaborar</h1>
        <button onclick="window.location.href='index.html'" class="btn-back">
            <i class="fas fa-arrow-left"></i> Volver al Inicio
        </button>
    </header>

    <main class="admin-main">
        <section class="form-section">
            <h2><i class="fas fa-plus"></i> Agregar Nuevo Recurso</h2>
            <form id="form-recurso">
                <label for="categoria">Subir Portada:</label>
                <select id="categoria" required>
                    <option value="" disabled selected>Sin categoría</option>
                    <option value="Matemáticas">Matemáticas</option>
                    <option value="Lengua Española">Lengua Española</option>
                    <option value="Ciencias Naturales">Ciencias Naturales</option>
                    <option value="Ciencias Sociales">Ciencias Sociales</option>
                    <option value="Inglés">Inglés</option>
                    <option value="Formación Humana">Formación Humana</option>
                </select>
                <input type="text" id="titulo" placeholder="Título del libro" required>
                <input type="url" id="url" placeholder="Fuente (Drive/PDF/enlace)" required>
                <button type="submit" id="btn-guardar">+ Publicar recurso</button>
                <p class="form-help"><i class="fas fa-info-circle" id="form-help-icon"></i>Por moderacion de contenido, los recursos tienen un plazo de 24h para publicarse...</p>
            </form>
        </section>

        <div id="mensaje"></div>
    </main>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="agregar.js"></script>
</body>
</html>
