<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Estante - Arrecife Digital</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/logopng.webp">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>
    <header>
        <div class="header-main2">
            <div class="header-left">
                <h1><i class="fas fa-bookmark"></i>Mi Estante</h1>
            </div>
            <div class="header-right">
                <button onclick="window.location.href='index.html'" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Inicio
                </button>
            </div>
        </div>
    </header>

    <main id="main-container">
        <div id="grid-recursos" class="grid-layout"></div>
    </main>
    <div id="toast-container"></div>

    <div id="custom-confirm" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-icon">
            <i class="fas fa-exclamation-circle"></i>
        </div>
        <h3 id="confirm-title">¿Estás seguro?</h3>
        <p id="confirm-msg">Esta acción no es reversible.</p>
        <div class="modal-buttons">
            <button id="confirm-cancel" class="btn-modal-secondary">Cancelar</button>
            <button id="confirm-accept" class="btn-modal-primary">Confirmar</button>
        </div>
    </div>
</div>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="estante.js"></script>
</body>
</html>
